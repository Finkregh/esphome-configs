---
# <docs.m5stack.com/en/core/StickS3> and <https://docs.m5stack.com/en/unit/co2>
# Thanks to <https://github.com/simenopsahl/esphome/blob/main/board/m5stack_stick_s3.yaml> for previous work!
#
# display off
#   -[front button]-> Co2+temp+hum display 
#   -[front button]-> co2 graph (backfilled from homeassistant if not on battery, otherwise some data from RAM)
#   -[front button]-> display off
# Or wait 10/120 seconds (battery/USB) for screen to turn off too.
#
# Some additional enegy savings when on battery, needs to be refined. Perhaps we should turn off wifi completely...

esphome:
  name: m5stick
  friendly_name: Stick S3
  min_version: 2026.7.0
  on_boot:
    - priority: 1199
      then:
        - lambda: |-
            // Disable M5PM1 auto-sleep (reg 0x09 = 0x00)
            // At this priority, i2c_internal is NOT ready yet, so use raw ESP-IDF
            i2c_master_bus_config_t bus_config = {};
            bus_config.i2c_port = -1;
            bus_config.sda_io_num = GPIO_NUM_47;
            bus_config.scl_io_num = GPIO_NUM_48;
            bus_config.clk_source = I2C_CLK_SRC_DEFAULT;
            bus_config.glitch_ignore_cnt = 7;
            bus_config.flags.enable_internal_pullup = true;

            i2c_master_bus_handle_t bus_handle;
            if (i2c_new_master_bus(&bus_config, &bus_handle) != ESP_OK) return;

            i2c_device_config_t dev_config = {};
            dev_config.dev_addr_length = I2C_ADDR_BIT_LEN_7;
            dev_config.device_address = 0x6E;
            dev_config.scl_speed_hz = 100000;

            i2c_master_dev_handle_t dev_handle;
            if (i2c_master_bus_add_device(bus_handle, &dev_config, &dev_handle) != ESP_OK) {
              i2c_del_master_bus(bus_handle);
              return;
            }

            // Disable auto-sleep: write 0x00 to register 0x09
            uint8_t write_buf[2] = {0x09, 0x00};
            i2c_master_transmit(dev_handle, write_buf, 2, 1000);

            i2c_master_bus_rm_device(dev_handle);
            i2c_del_master_bus(bus_handle);
    - priority: -10
      then:
        # Boot with display OFF
        - light.turn_off: backlight_light
        - globals.set:
            id: display_state
            value: "0"

packages:
  board: github://simenopsahl/esphome/board/m5stack_stick_s3.yaml@main

logger:

# --- Remove unused components from board package ---
motion:
  - id: !extend motion_bmi270
    update_interval: never

remote_receiver: !remove
remote_transmitter: !remove
infrared: !remove
microphone: !remove
speaker: !remove
media_player: !remove
audio_dac: !remove

switch:
  - id: !remove mic_mute

# --- Globals ---
globals:
  # Display state: 0=OFF, 1=SENSOR_PAGE, 2=GRAPH_PAGE
  - id: display_state
    type: int
    restore_value: no
    initial_value: "0"
  # CO2 history circular buffer (max 60 readings)
  - id: co2_history
    type: std::vector<float>
    restore_value: no
  # Whether HA has sent historical data
  - id: history_received
    type: bool
    restore_value: no
    initial_value: "false"

# --- Scripts ---
script:
  # Cycle display state: OFF → SENSOR → GRAPH → OFF
  - id: display_cycle
    then:
      - lambda: |-
          int state = id(display_state);
          state = (state + 1) % 3;
          id(display_state) = state;
      - if:
          condition:
            lambda: "return id(display_state) == 0;"
          then:
            - script.execute: display_off
      - if:
          condition:
            lambda: "return id(display_state) == 1;"
          then:
            - light.turn_on: backlight_light
            - lvgl.page.show: page_sensor
            - script.execute: display_auto_off
      - if:
          condition:
            lambda: "return id(display_state) == 2;"
          then:
            - light.turn_on: backlight_light
            - lvgl.page.show: page_co2_graph
            - script.execute: co2_update_chart
            - script.execute: display_auto_off

  # Turn display off
  - id: display_off
    then:
      - globals.set:
          id: display_state
          value: "0"
      - light.turn_off: backlight_light
      - lvgl.page.show: page_blank

  # Auto-off timer: 10s on battery, 120s on USB
  - id: display_auto_off
    mode: restart
    then:
      - if:
          condition:
            binary_sensor.is_on: on_battery
          then:
            - delay: 10s
          else:
            - delay: 120s
      - script.execute: display_off

  # Update the CO2 line graph
  - id: co2_update_chart
    then:
      - lambda: |-
          // Compute graph points for horizontal graph (101px wide, 206px tall)
          // X-axis = time (left to right), Y-axis = CO2 value (bottom to top)
          static lv_point_precise_t points[24];
          int count = id(co2_history).size();
          if (count == 0) {
            points[0].x = 50;
            points[0].y = 103;
            lv_line_set_points(id(co2_line).obj, points, 1);
            return;
          }
          float min_val = id(co2_history)[0];
          float max_val = id(co2_history)[0];
          for (int i = 1; i < count; i++) {
            if (id(co2_history)[i] < min_val) min_val = id(co2_history)[i];
            if (id(co2_history)[i] > max_val) max_val = id(co2_history)[i];
          }
          if (max_val - min_val < 50) {
            float mid = (max_val + min_val) / 2.0f;
            min_val = mid - 25;
            max_val = mid + 25;
          }
          int num_points = count < 24 ? count : 24;
          for (int i = 0; i < num_points; i++) {
            int idx = (count > 1) ? (i * (count - 1)) / (num_points - 1) : 0;
            points[i].x = (num_points > 1) ? (i * 101) / (num_points - 1) : 50;
            float normalized = (id(co2_history)[idx] - min_val) / (max_val - min_val);
            points[i].y = 206 - (int)(normalized * 206.0f);
          }
          lv_line_set_points(id(co2_line).obj, points, num_points);
      - lvgl.label.update:
          id: lbl_graph_max
          text: !lambda |-
            if (id(co2_history).empty()) return std::string("---");
            float max_val = id(co2_history)[0];
            for (auto v : id(co2_history)) if (v > max_val) max_val = v;
            char buf[8]; snprintf(buf, sizeof(buf), "%.0f", max_val);
            return std::string(buf);
      - lvgl.label.update:
          id: lbl_graph_mid
          text: !lambda |-
            if (id(co2_history).empty()) return std::string("---");
            float min_val = id(co2_history)[0];
            float max_val = id(co2_history)[0];
            for (auto v : id(co2_history)) {
              if (v < min_val) min_val = v;
              if (v > max_val) max_val = v;
            }
            float mid = (min_val + max_val) / 2.0f;
            char buf[8]; snprintf(buf, sizeof(buf), "%.0f", mid);
            return std::string(buf);
      - lvgl.label.update:
          id: lbl_graph_min
          text: !lambda |-
            if (id(co2_history).empty()) return std::string("---");
            float min_val = id(co2_history)[0];
            for (auto v : id(co2_history)) if (v < min_val) min_val = v;
            char buf[8]; snprintf(buf, sizeof(buf), "%.0f", min_val);
            return std::string(buf);

# --- PMIC Power Detection ---
binary_sensor:
  # USB/Battery detection via VIN voltage (more reliable than PWR_SRC register)
  - platform: template
    id: on_battery
    name: "On Battery"
    device_class: battery
    entity_category: diagnostic
    on_state:
      then:
        - if:
            condition:
              binary_sensor.is_on: on_battery
            then:
              # Battery mode: poll sensor every 60s
              - component.suspend: scd4x_sensor
              - component.resume:
                  id: scd4x_sensor
                  update_interval: 60s
              - logger.log: "Power mode: BATTERY (60s interval, 10s display timeout)"
            else:
              # USB mode: poll sensor every 10s
              - component.suspend: scd4x_sensor
              - component.resume:
                  id: scd4x_sensor
                  update_interval: 10s
              - logger.log: "Power mode: USB (10s interval, 120s display timeout)"

  # Charging status via PMIC GPIO0 input (reg 0x12 bit 0)
  - platform: template
    id: battery_charging
    name: "Battery Charging"
    device_class: battery_charging
    entity_category: diagnostic

  # Override front button to cycle display
  - id: !extend button_front
    on_press:
      then:
        - script.execute: display_cycle

# --- Poll PMIC every 30s via the board's i2c_internal bus ---
interval:
  - interval: 30s
    then:
      - lambda: |-
          // Read M5PM1 PMIC via ESPHome's i2c_internal bus (GPIO47/48, addr 0x6E)
          uint8_t buf[2];

          // 1. Read VIN voltage (reg 0x24-0x25, 16-bit LE, mV)
          //    More reliable than PWR_SRC register for USB detection
          uint8_t reg_vin = 0x24;
          auto err = id(i2c_internal).write(0x6E, &reg_vin, 1, false);
          if (err != i2c::ERROR_OK) {
            ESP_LOGW("pmic", "I2C write failed for VIN read");
            return;
          }
          err = id(i2c_internal).read(0x6E, buf, 2);
          if (err != i2c::ERROR_OK) {
            ESP_LOGW("pmic", "I2C read failed for VIN");
            return;
          }
          uint16_t vin_mv = buf[0] | (buf[1] << 8);
          bool usb_connected = (vin_mv > 4000);
          id(on_battery).publish_state(!usb_connected);
          ESP_LOGD("pmic", "VIN: %u mV -> %s", vin_mv, usb_connected ? "USB" : "BATTERY");

          // 2. Read battery voltage (reg 0x22-0x23, 16-bit LE, mV)
          uint8_t reg_vbat = 0x22;
          err = id(i2c_internal).write(0x6E, &reg_vbat, 1, false);
          if (err != i2c::ERROR_OK) return;
          err = id(i2c_internal).read(0x6E, buf, 2);
          if (err != i2c::ERROR_OK) return;
          uint16_t vbat_mv = buf[0] | (buf[1] << 8);
          float vbat_v = vbat_mv / 1000.0f;
          id(battery_voltage).publish_state(vbat_v);

          // 3. Calculate battery percentage (linear: 3300mV=0%, 4150mV=100%)
          float pct = (vbat_mv - 3300.0f) / (4150.0f - 3300.0f) * 100.0f;
          if (pct < 0) pct = 0;
          if (pct > 100) pct = 100;
          id(battery_level).publish_state(pct);
          ESP_LOGD("pmic", "VBAT: %u mV (%.0f%%)", vbat_mv, pct);

          // 4. Read charging status (reg 0x12, bit 0: LOW=charging)
          uint8_t reg_gpio = 0x12;
          err = id(i2c_internal).write(0x6E, &reg_gpio, 1, false);
          if (err != i2c::ERROR_OK) return;
          uint8_t gpio_in = 0;
          err = id(i2c_internal).read(0x6E, &gpio_in, 1);
          if (err != i2c::ERROR_OK) return;
          bool charging = !(gpio_in & 0x01);  // bit 0 LOW = charging
          id(battery_charging).publish_state(charging);
          ESP_LOGD("pmic", "Charging: %s", charging ? "YES" : "NO");

# --- I2C for Grove SCD4x ---
i2c:
  - id: grove_i2c
    sda: GPIO09
    scl: GPIO10
    frequency: 100kHz
    timeout: 10ms
    scan: true

# --- SCD4x Sensor with CO2 history buffer ---
sensor:
  - id: !remove sound_level_sensor
  # Battery voltage from PMIC (published by interval lambda)
  - platform: template
    id: battery_voltage
    name: "Battery Voltage"
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    entity_category: diagnostic
    accuracy_decimals: 2
  # Battery level percentage (linear 3.3V-4.15V)
  - platform: template
    id: battery_level
    name: "Battery Level"
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    entity_category: diagnostic
    accuracy_decimals: 0
  - platform: scd4x
    id: scd4x_sensor
    i2c_id: grove_i2c
    co2:
      id: co2_ppm
      name: "CO2"
      on_value:
        then:
          # Store in history buffer
          - lambda: |-
              id(co2_history).push_back(x);
              if (id(co2_history).size() > 60) {
                id(co2_history).erase(id(co2_history).begin());
              }
          # Update sensor page labels
          - lvgl.label.update:
              id: lbl_co2
              text: !lambda |-
                char buf[8];
                snprintf(buf, sizeof(buf), "%.0f", x);
                return std::string(buf);
          - lvgl.label.update:
              id: lbl_co2
              text_color: !lambda |-
                if (x < 1000) return lv_color_hex(0x00FF00);       // green
                if (x < 1200) return lv_color_hex(0xFFFF88);       // light-yellow
                if (x < 1500) return lv_color_hex(0xEF843C);       // orange
                if (x < 2000) return lv_color_hex(0xFF0000);       // red
                return lv_color_hex(0xD80283);                      // magenta (>2000)
          # Update graph if graph page is active
          - if:
              condition:
                lambda: "return id(display_state) == 2;"
              then:
                - script.execute: co2_update_chart
    temperature:
      id: temp_value
      name: "Temperature"
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_temp
              text: !lambda |-
                char buf[16];
                snprintf(buf, sizeof(buf), "%.1f°C", x);
                return std::string(buf);
    humidity:
      id: hum_value
      name: "Humidity"
      on_value:
        then:
          - lvgl.label.update:
              id: lbl_hum
              text: !lambda |-
                char buf[16];
                snprintf(buf, sizeof(buf), "%.0f%%", x);
                return std::string(buf);
    address: 0x62
    update_interval: 60s

# --- API with HA Backfill Service ---
api:
  encryption:
    key: !secret api_key
  services:
    - service: update_co2_history
      variables:
        co2_values: float[]
      then:
        - lambda: |-
            if (!id(on_battery).state) {  // Only accept on USB
              id(co2_history).clear();
              for (int i = 0; i < co2_values.size() && i < 60; i++) {
                id(co2_history).push_back(co2_values[i]);
              }
              id(history_received) = true;
              ESP_LOGD("co2", "Received %d historical values from HA", co2_values.size());
              if (id(display_state) == 2) {
                id(co2_update_chart).execute();
              }
            }
  on_client_connected:
    then:
      - delay: 2s
      - homeassistant.event:
          event: esphome.m5stick_connected

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: m5stick Fallback
    password: m5stickfallback

captive_portal:

web_server:
  port: 80

