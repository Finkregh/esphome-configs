lvgl:
  buffer_size: 75%
  default_font: font_md
  bg_color: 0x000000
  pages:
    # Blank page (display off state)
    - id: page_blank
      skip: true
      widgets:
        - obj:
            width: 135
            height: 240
            bg_color: 0x000000

    # Sensor page: Big CO2 + temp/humidity row
    - id: page_sensor
      widgets:
        - label:
            id: lbl_co2
            align: CENTER
            y: -20
            text: "---"
            text_font: font_fl
            text_color: 0x00FF00
        - label:
            id: lbl_co2_unit
            align: CENTER
            y: 25
            text: "ppm"
            text_font: font_sm
            text_color: 0xAAAAAA
        - label:
            id: lbl_temp
            align: BOTTOM_LEFT
            x: 10
            y: -15
            text: "--.-°C"
            text_font: font_md
            text_color: 0xFFFFFF
        - label:
            id: lbl_hum
            align: BOTTOM_RIGHT
            x: -10
            y: -15
            text: "--%"
            text_font: font_md
            text_color: 0xFFFFFF

    # CO2 Graph page: horizontal line graph over last ~60 minutes
    # Layout: title (top) | max label | graph area | mid label | min label (bottom)
    - id: page_co2_graph
      widgets:
        - label:
            id: lbl_graph_title
            align: TOP_MID
            y: 3
            text: "CO2 (60min)"
            text_font: font_sm
            text_color: 0xAAAAAA
        # Y-axis labels: max (top-right of graph), mid (center-right), min (bottom-right)
        - label:
            id: lbl_graph_max
            align: TOP_RIGHT
            x: -3
            y: 18
            text: "---"
            text_font: font_sm
            text_color: 0x888888
        - label:
            id: lbl_graph_mid
            align: RIGHT_MID
            x: -3
            y: 10
            text: "---"
            text_font: font_sm
            text_color: 0x666666
        - label:
            id: lbl_graph_min
            align: BOTTOM_RIGHT
            x: -3
            y: -5
            text: "---"
            text_font: font_sm
            text_color: 0x888888
        # Graph container: full width horizontal, tall for portrait display
        - obj:
            x: 0
            y: 18
            width: 105
            height: 210
            bg_color: 0x1a1a2e
            border_width: 0
            pad_all: 2
            widgets:
              - line:
                  id: co2_line
                  width: 101
                  height: 206
                  line_color: 0x00BFFF
                  line_width: 2
                  line_rounded: true
                  points:
                    - 50, 103
